# Site settings
title: BH CHOI
SEOTitle: BH CHOI — Projects, Research, Notes & Play
lang: ko
header-img: img/home-bg.jpg
email: cbh456746@gmail.com
description: "프로젝트, 연구, 학습 노트, 그리고 Play를 기록하는 개인 아카이브"
keyword: "projects, research, notes, play, data science, machine learning"
url: "https://cbh456746.github.io"
baseurl: "" # for example, '/blog' if your blog hosted on 'host/blog'

# Publish posts or collection documents with a future date.
future: false

# SNS settings
RSS: false
github_username: cbh456746
# thread_username: bh.arxiv.isn

# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
highlighter: rouge
permalink: pretty
paginate: 10
exclude:
  [
    "less",
    "node_modules",
    "Gruntfile.js",
    "package.json",
    "README.md",
    "README.zh.md",
    "docs",
    "scripts",
    "templates",
    "package-lock.json",
    "TASKS.md",
    "DECISIONS.md",
    "ARCHITECTURE.md",
    "CONTENT_GUIDE.md",
    "CONTRIBUTING.md",
    "STYLE_GUIDE.md",
    "MAINTENANCE_RUNBOOK.md",
    "AGENTS.md",
  ]
anchorjs: true # if you want to customize anchor. check out line:181 of `post.html`
# If you have timezone issue (e.g. #68) in China, uncomment to use this:
#timezone: CN

# Gems
# from PR#40, to support local preview for Jekyll 3.0
# make sure you have this gem installed
# `$ gem install jekyll-paginate`
plugins: [jekyll-paginate]

collections:
  projects:
    output: true
    permalink: /projects/:name/
  research:
    output: true
    permalink: /research/:name/
  notes:
    output: true
    permalink: /notes/:name/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
      show_in_archive: true
  - scope:
      path: ""
      type: research
    values:
      layout: research
      show_in_archive: true
  - scope:
      path: ""
      type: notes
    values:
      layout: note
      show_in_archive: true

# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
kramdown:
  input: GFM # use Github Flavored Markdown !important
  math_engine: mathjax
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1
    

# Disqus settings
disqus_username: BH CHOI

# Netease settings
netease_comment: false

# Analytics settings
# Baidu Analytics
# ba_track_id: [your track id]

# Google Analytics
ga_track_id: "UA-49627206-1" # Format: UA-xxxxxx-xx
ga_domain: huangxuan.me

# Sidebar settings
sidebar: true # whether or not using Sidebar.
sidebar-about-description: "Free-spirited soul BH CHOI. Love Math & Data Science."
sidebar-avatar: img/blog-profile-test.jpg # use absolute URL, seeing it's used in both `/` and `/about/`

# Featured Tags
featured-tags: true # whether or not using Feature-Tags
featured-condition-size: 1 # A tag will be featured if the size of it is more than this condition value

# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: false
retire-service-worker: true

# MathJax rendering for layout:page (e.g. post preview)
page-mathjax: true

# Friends
friends:
  [
  ]
