<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="{{ site.chrome-tab-theme-color | default: '#171717' }}">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.SEOTitle | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: page.subtitle | default: site.description | strip_html | normalize_whitespace }}">
  <link rel="canonical" href="{{ page.url | replace: 'index.html', '' | absolute_url }}">
  <link rel="stylesheet" href="{{ '/css/site.css' | relative_url }}">
  {% if site.ga_track_id and site.ga_track_id != '' %}
  <!-- Existing analytics setting is intentionally retained until the owner replaces or removes it. -->
  {% endif %}
  {% if page.mathjax %}{% include mathjax_support.html %}{% endif %}
  {% if page.mermaid %}{% include mermaid_support.html %}{% endif %}
</head>
