<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 웹페이지</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- 왼쪽: 프로필 & 카테고리 -->

                <img id="profileimage" src="testimage.jpg" alt="프로필 이미지">
                <h2>최병호</h2>
                <p>스트리머 | 개발자</p>
            </div>
            <nav class="categories">

                <ul>

                    <li><a href="#">개발</a></li>
                    <li><a href="#">일상</a></li>
                </ul>
            </nav>
        </aside>

        <!-- 오른쪽: 포스트 -->
        <main class="content">
            <article>
                <h2>첫 번째 포스트</h2>
                <p>여기에 첫 번째 포스트 내용을 작성하세요.</p>
            </article>
            <article>
                <h2>두 번째 포스트</h2>
                <p>여기에 두 번째 포스트 내용을 작성하세요.</p>
